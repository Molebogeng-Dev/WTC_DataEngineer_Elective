# docker-compose.yml
#
# Spins up the full SpendSense ETL pipeline:
#   - postgres        : Airflow's own metadata DB (required by Airflow itself,
#                        NOT where our financial data lives — that's SQLite,
#                        written to ./data/output/finance.db on the host)
#   - airflow-init     : one-off container that initializes Airflow's DB and
#                        creates the default admin user, then exits
#   - airflow-webserver: Airflow UI at http://localhost:8080
#   - airflow-scheduler: runs the DAG defined in dags/bank_statement_etl_dag.py
#   - frontend         : simple static file server for frontend/index.html
#                        at http://localhost:8081
#
# Quick start:
#   docker compose up --build
#   open http://localhost:8080  (user: admin / pass: admin) to trigger the DAG
#   open http://localhost:8081  to use the upload-and-visualize app directly

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./scripts:/opt/airflow/scripts
    - ./sql:/opt/airflow/sql
    - ./data:/opt/airflow/data
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      - airflow-init
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      - airflow-init

  frontend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "8081:8081"
    command: python -m http.server 8081

volumes:
  postgres_data:
  airflow_logs:
